# Chains GET /api/sync-stats with increasing offset until next_offset >= total_players.
# Set repository secrets: STATS_SYNC_BASE_URL (e.g. https://your-app.vercel.app), SYNC_STATS_SECRET (must match Vercel env).
#
# Optional: set the same SYNC_STATS_SECRET in Vercel Production env. Admin can still run sync from the browser
# using x-admin-password (enter ADMIN_PASSWORD in Admin) when SYNC_STATS_SECRET is enabled.
#
# Off-season: disable this workflow in GitHub (Actions → workflow → … → Disable) or remove the schedule so
# offset=0 is not run daily (first batch wipes that season’s stats before re-importing).
#
# NHL `year` query param is taken from lib/current-pool.js (CURRENT_POOL_PLAYOFF_YEAR) unless you override
# it in workflow_dispatch — must match the season your `players` rows use or sync will target the wrong year
# (empty batches / stats not matching the pool).
#
# If stats still do not update on the schedule:
# - Repo → Settings → Actions → General: allow Actions; scheduled workflows only run from the default branch.
# - Add secret STATS_SYNC_BASE_URL (no trailing slash). If SYNC_STATS_SECRET is set on Vercel, set the same value here.
# - HTTP 401 in logs: secret mismatch or missing Bearer auth.

name: Sync playoff stats

on:
  schedule:
    # 2:00 AM Eastern during EDT (UTC-4) → 06:00 UTC. During EST (UTC-5) this fires 1:00 AM Eastern (GitHub cron is UTC-only).
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "NHL playoff year override (leave empty to use lib/current-pool.js)"
        required: false
        default: ""
      limit:
        description: "Players per batch (keep small for Vercel ~60s limit)"
        required: false
        default: "8"
      concurrency:
        description: "NHL requests in parallel per batch (1–10)"
        required: false
        default: "1"

# Do not cancel a long multi-batch run when another workflow starts (would leave stats partially synced).
concurrency:
  group: sync-playoff-stats-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # workflow_dispatch only — avoids referencing github.event.inputs on schedule
      - name: Export manual run inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "DISPATCH_YEAR=${{ github.event.inputs.year }}" >> "$GITHUB_ENV"
          echo "DISPATCH_LIMIT=${{ github.event.inputs.limit }}" >> "$GITHUB_ENV"
          echo "DISPATCH_CONCURRENCY=${{ github.event.inputs.concurrency }}" >> "$GITHUB_ENV"

      - name: Chain sync-stats batches
        env:
          STATS_SYNC_BASE_URL: ${{ secrets.STATS_SYNC_BASE_URL }}
          SYNC_STATS_SECRET: ${{ secrets.SYNC_STATS_SECRET }}
        run: |
          set -euo pipefail
          BASE="${STATS_SYNC_BASE_URL%/}"
          if [ -z "$BASE" ]; then
            echo "::error::Missing repository secret STATS_SYNC_BASE_URL (production site origin, no trailing slash)"
            exit 1
          fi

          POOL_YEAR=$(sed -n 's/.*CURRENT_POOL_PLAYOFF_YEAR = \([0-9][0-9]*\).*/\1/p' lib/current-pool.js | head -1)
          if [ -z "${POOL_YEAR}" ]; then
            echo "::error::Could not read CURRENT_POOL_PLAYOFF_YEAR from lib/current-pool.js"
            exit 1
          fi

          YEAR="$(echo "${DISPATCH_YEAR:-}" | xargs)"
          if [ -z "$YEAR" ]; then
            YEAR="${POOL_YEAR}"
          fi
          echo "NHL playoff year=${YEAR} (pool file had ${POOL_YEAR}; empty manual year → use pool file)"

          LIMIT="$(echo "${DISPATCH_LIMIT:-}" | xargs)"
          CONCURRENCY="$(echo "${DISPATCH_CONCURRENCY:-}" | xargs)"
          [ -z "$LIMIT" ] && LIMIT=8
          [ -z "$CONCURRENCY" ] && CONCURRENCY=1

          AUTH=()
          if [ -n "${SYNC_STATS_SECRET:-}" ]; then
            AUTH=(-H "Authorization: Bearer ${SYNC_STATS_SECRET}")
          else
            echo "::warning::SYNC_STATS_SECRET is empty — calling a public /api/sync-stats (set secret + Vercel env to lock down)"
          fi

          OFFSET=0
          BATCH=0
          while true; do
            BATCH=$((BATCH + 1))
            URL="${BASE}/api/sync-stats?year=${YEAR}&limit=${LIMIT}&offset=${OFFSET}&concurrency=${CONCURRENCY}"
            echo "=== Batch ${BATCH} ==="
            HTTP=$(curl -sS -o /tmp/sync-stats.json -w "%{http_code}" "${AUTH[@]}" "$URL")
            if [ "$HTTP" != "200" ]; then
              echo "::error::HTTP ${HTTP}"
              if [ "$HTTP" = "401" ]; then
                echo "::error::Unauthorized — set repository secret SYNC_STATS_SECRET to match Vercel Production SYNC_STATS_SECRET (or leave both unset)."
              fi
              cat /tmp/sync-stats.json
              exit 1
            fi
            OK=$(jq -r '.ok' /tmp/sync-stats.json)
            if [ "$OK" != "true" ]; then
              echo "::error::sync-stats returned ok=false"
              cat /tmp/sync-stats.json
              exit 1
            fi
            NEXT=$(jq -r '.next_offset' /tmp/sync-stats.json)
            TOTAL=$(jq -r '.total_players' /tmp/sync-stats.json)
            PLAYERS=$(jq -r '.players' /tmp/sync-stats.json)
            ROWS=$(jq -r '.stats_rows' /tmp/sync-stats.json)
            echo "players_in_batch=${PLAYERS} stats_rows=${ROWS} next_offset=${NEXT} total_players=${TOTAL}"
            if [ "$NEXT" -ge "$TOTAL" ]; then
              echo "Complete."
              break
            fi
            OFFSET=$NEXT
          done
